name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  db:
    name: F12 persistence — migrations, CRUD smoke, async guard
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campus_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/campus_rag
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-only-password
      JWT_SECRET: ci-only-not-a-real-secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: CRUD smoke tests
        working-directory: backend
        run: pytest tests/db -v

      - name: Async-guard (no sync SQLAlchemy / blocking requests / sync redis in app/db)
        working-directory: backend
        run: |
          set -e
          if grep -RnE "^\s*(from sqlalchemy\.orm import[^\n]*\bSession\b|import requests\b|from redis import(?!\.asyncio)|^\s*import redis$)" app/db; then
            echo "Sync SQLAlchemy Session / requests / sync redis import found in app/db — forbidden by the async-everywhere rule." >&2
            exit 1
          fi
          if grep -RnE "create_engine\(" app/db; then
            echo "Sync create_engine() found in app/db — use create_async_engine instead." >&2
            exit 1
          fi
          ruff check app/db

  ingestion:
    name: F1 ingestion — pipeline tests, async guard
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campus_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/campus_rag
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-only-password
      JWT_SECRET: ci-only-not-a-real-secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Ingestion pipeline tests (OCR/libreoffice subprocess calls are mocked; the real
          binaries only run in the Docker ingestion image)
        working-directory: backend
        run: pytest tests/ingestion -v

      - name: Async-guard (no sync loader .invoke/.embed_documents, blocking requests, sync
          redis in app/ingestion)
        working-directory: backend
        run: |
          set -e
          if grep -RnE "^\s*(import requests\b|from redis import(?!\.asyncio)|^\s*import redis$)" app/ingestion; then
            echo "Blocking requests / sync redis import found in app/ingestion — forbidden by the async-everywhere rule." >&2
            exit 1
          fi
          # Only flag an actual code call, not the word ".load()" inside a comment/docstring
          # (several loader docstrings discuss the wrapped libraries' sync .load() by name,
          # always in backticks — `.load()` — which real code never contains).
          if grep -RnE "\.load\(\)" app/ingestion --include="*.py" | grep -v to_thread | grep -v '`.load()`'; then
            echo "Sync loader .load() call found outside anyio.to_thread.run_sync in app/ingestion." >&2
            exit 1
          fi
          ruff check app/ingestion

  indexing:
    name: F2 indexing — chunk/embed/upsert tests, async guard
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campus_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/campus_rag
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-only-password
      JWT_SECRET: ci-only-not-a-real-secret
      OPENAI_API_KEY: sk-ci-only-placeholder
      PINECONE_API_KEY: pc-ci-only-placeholder
      PINECONE_INDEX: campus-rag-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Indexing pipeline tests (OpenAI/Pinecone clients are injected fakes; no network
          calls to real embedding/vector-store providers occur in this suite)
        working-directory: backend
        run: pytest tests/indexing -v

      - name: Async-guard (no sync embed_documents/embed_query/invoke, blocking requests, sync
          redis in app/indexing)
        working-directory: backend
        run: |
          set -e
          if grep -RnE "\.embed_documents\(|\.embed_query\(|import requests\b|from redis import(?!\.asyncio)|^\s*import redis$" app/indexing; then
            echo "Sync embedding call / blocking requests / sync redis import found in app/indexing — forbidden by the async-everywhere rule." >&2
            exit 1
          fi
          if grep -RnE "\.invoke\(" app/indexing --include="*.py"; then
            echo "Sync .invoke() call found in app/indexing — use .ainvoke() instead." >&2
            exit 1
          fi
          if grep -RnE "create_engine\(" app/indexing; then
            echo "Sync create_engine() found in app/indexing — use create_async_engine instead." >&2
            exit 1
          fi
          ruff check app/indexing

  rag:
    name: F3 baseline RAG chain — chain tests, async guard
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campus_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/campus_rag
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-only-password
      JWT_SECRET: ci-only-not-a-real-secret
      OPENAI_API_KEY: sk-ci-only-placeholder
      PINECONE_API_KEY: pc-ci-only-placeholder
      PINECONE_INDEX: campus-rag-ci
      # LANGFUSE_PUBLIC_KEY/LANGFUSE_SECRET_KEY deliberately unset — Langfuse is optional
      # (observability.langfuse_handler() returns None without them), so CI never needs real
      # Langfuse credentials to go green.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: RAG chain tests (ChatOpenAI/PineconeVectorStore are injected fakes; no network
          calls to real LLM/embedding/vector-store providers occur in this suite)
        working-directory: backend
        run: pytest tests/rag -v

      - name: Async-guard (no sync invoke/stream/embed_query, blocking requests, sync redis in
          app/rag)
        working-directory: backend
        run: |
          set -e
          if grep -RnE "\.embed_documents\(|\.embed_query\(|import requests\b|from redis import(?!\.asyncio)|^\s*import redis$" app/rag; then
            echo "Sync embedding call / blocking requests / sync redis import found in app/rag — forbidden by the async-everywhere rule." >&2
            exit 1
          fi
          if grep -RnE "\.invoke\(" app/rag --include="*.py"; then
            echo "Sync .invoke() call found in app/rag — use .ainvoke() instead." >&2
            exit 1
          fi
          if grep -RnE "\.stream\(" app/rag --include="*.py"; then
            echo "Sync .stream() call found in app/rag — use .astream()/.astream_events() instead." >&2
            exit 1
          fi
          if grep -RnE "create_engine\(" app/rag; then
            echo "Sync create_engine() found in app/rag — use create_async_engine instead." >&2
            exit 1
          fi
          ruff check app/rag

  caching:
    name: F9 semantic cache — tier tests, adversarial calibration, async guard
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campus_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/campus_rag
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-only-password
      JWT_SECRET: ci-only-not-a-real-secret
      OPENAI_API_KEY: sk-ci-only-placeholder
      PINECONE_API_KEY: pc-ci-only-placeholder
      PINECONE_INDEX: campus-rag-ci
      # REDIS_URL deliberately unset — the hot tier is optional (redis_hot short-circuits to a miss
      # when it is None), and every test injects a fake Redis client, so CI needs no Redis service.
      # That is a property of the fail-open design, not a gap in the tests: `test_redis_hot.py`
      # covers the down/hanging/corrupt paths explicitly.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Cache tests (Redis and OpenAI are injected fakes; the adversarial calibration runs
          offline against committed text-embedding-3-small vectors, so no network calls to real
          providers occur in this suite)
        working-directory: backend
        run: pytest tests/cache -v

      - name: Async-guard (no sync embed_query/invoke, blocking requests, sync redis in
          app/caching — this is the one module that talks to Redis, so the guard matters most here)
        working-directory: backend
        run: |
          set -e
          if grep -RnE "\.embed_documents\(|\.embed_query\(|import requests\b|from redis import(?!\.asyncio)|^\s*import redis$" app/caching; then
            echo "Sync embedding call / blocking requests / sync redis import found in app/caching — forbidden by the async-everywhere rule (use 'import redis.asyncio as redis')." >&2
            exit 1
          fi
          if grep -RnE "\.invoke\(" app/caching --include="*.py"; then
            echo "Sync .invoke() call found in app/caching — use .ainvoke() instead." >&2
            exit 1
          fi
          if grep -RnE "create_engine\(" app/caching; then
            echo "Sync create_engine() found in app/caching — use create_async_engine instead." >&2
            exit 1
          fi
          ruff check app/caching

  memory:
    name: F17 session memory — sessions/ask tests, window logic, async guard
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campus_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/campus_rag
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-only-password
      JWT_SECRET: ci-only-not-a-real-secret
      OPENAI_API_KEY: sk-ci-only-placeholder
      PINECONE_API_KEY: pc-ci-only-placeholder
      PINECONE_INDEX: campus-rag-ci
      # The summariser LLM is an injected fake in every test — CI makes no OpenAI call.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Memory tests (the gpt-4o-mini summariser is an injected fake; sessions/messages are the
          F12 tables, no new migration)
        working-directory: backend
        run: pytest tests/memory -v

      - name: Async-guard (no sync embed/invoke/stream, blocking requests, sync redis, or
          create_engine in app/memory — the summariser must use .ainvoke())
        working-directory: backend
        run: |
          set -e
          if grep -RnE "\.embed_documents\(|\.embed_query\(|import requests\b|from redis import(?!\.asyncio)|^\s*import redis$" app/memory; then
            echo "Sync embedding call / blocking requests / sync redis import found in app/memory — forbidden by the async-everywhere rule." >&2
            exit 1
          fi
          if grep -RnE "\.invoke\(" app/memory --include="*.py"; then
            echo "Sync .invoke() call found in app/memory — use .ainvoke() instead." >&2
            exit 1
          fi
          if grep -RnE "(?<!a)\.stream\(" app/memory --include="*.py"; then
            echo "Sync .stream() call found in app/memory — use .astream()/.astream_events() instead." >&2
            exit 1
          fi
          if grep -RnE "create_engine\(" app/memory; then
            echo "Sync create_engine() found in app/memory — use create_async_engine instead." >&2
            exit 1
          fi
          ruff check app/memory

  evals:
    name: F4 evaluation harness — suite tests, async guard
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campus_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/campus_rag
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-only-password
      JWT_SECRET: ci-only-not-a-real-secret
      OPENAI_API_KEY: sk-ci-only-placeholder
      PINECONE_API_KEY: pc-ci-only-placeholder
      PINECONE_INDEX: campus-rag-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Eval-harness tests (F3 seams retrieve/answer/astream and the RAGAS judge are all
          injected fakes; no network calls to real LLM/embedding/vector-store providers occur.
          The dataset lint gate runs against fixtures, NOT the committed seed qa_dataset.jsonl,
          which is intentionally still under quota until scaled to 60–80.)
        working-directory: backend
        run: pytest tests/evals -v

      - name: Async-guard (no sync invoke/stream/embed_query, blocking requests, sync redis in
          app/evals; RAGAS's blocking evaluate() is only reached via anyio.to_thread.run_sync)
        working-directory: backend
        run: |
          set -e
          if grep -RnE "\.embed_documents\(|\.embed_query\(|import requests\b|from redis import(?!\.asyncio)|^\s*import redis$" app/evals; then
            echo "Sync embedding call / blocking requests / sync redis import found in app/evals — forbidden by the async-everywhere rule." >&2
            exit 1
          fi
          if grep -RnE "\.invoke\(" app/evals --include="*.py"; then
            echo "Sync .invoke() call found in app/evals — use .ainvoke() instead." >&2
            exit 1
          fi
          if grep -RnE "\.stream\(" app/evals --include="*.py"; then
            echo "Sync .stream() call found in app/evals — use .astream()/.astream_events() or httpx send(stream=True) instead." >&2
            exit 1
          fi
          if grep -RnE "create_engine\(" app/evals; then
            echo "Sync create_engine() found in app/evals — use create_async_engine instead." >&2
            exit 1
          fi
          ruff check app/evals

  auth:
    name: F10 auth — flow, RBAC matrix, lockout, async + secrets guards
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campus_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/campus_rag
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-only-password
      JWT_SECRET: ci-only-not-a-real-secret
      OPENAI_API_KEY: sk-ci-only-placeholder
      PINECONE_API_KEY: pc-ci-only-placeholder
      PINECONE_INDEX: campus-rag-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Auth tests (no external providers are involved at all — F10 makes zero OpenAI calls.
          Postgres is real because refresh_tokens IS the blacklist and login_attempts IS the
          lockout window, so faking the DB would fake the feature.)
        working-directory: backend
        run: pytest tests/auth -v

      - name: Async-guard (no sync SQLAlchemy, blocking requests, or sync redis in app/auth —
          bcrypt is the one CPU-bound call and must go through anyio.to_thread.run_sync)
        working-directory: backend
        run: |
          set -e
          if grep -RnE "import requests\b|from redis import(?!\.asyncio)|^\s*import redis$" app/auth app/api; then
            echo "Blocking requests / sync redis import found in app/auth|app/api — forbidden by the async-everywhere rule." >&2
            exit 1
          fi
          if grep -RnE "create_engine\(" app/auth app/api; then
            echo "Sync create_engine() found in app/auth|app/api — use create_async_engine instead." >&2
            exit 1
          fi
          ruff check app/auth app/api app/core/security.py app/core/exceptions.py app/main.py

      - name: Bcrypt-guard (AC-15 — every hash/verify goes through core/security.py, which is the
          one module that wraps them in anyio.to_thread.run_sync. A CryptContext anywhere else is
          a blocking bcrypt call on the event loop.)
        working-directory: backend
        run: |
          set -e
          if grep -RnE "CryptContext|passlib" app --include="*.py" | grep -v "^app/core/security.py:"; then
            echo "passlib/CryptContext used outside app/core/security.py — route hashing through hash_password/verify_password so it stays off the event loop." >&2
            exit 1
          fi
